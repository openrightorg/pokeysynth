<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>POKEY MIDI Synth</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #111317;
      --panel: #1b2028;
      --panel-2: #242b35;
      --text: #f3f5f7;
      --muted: #9aa5b1;
      --line: #343d49;
      --accent: #f0c04a;
      --accent-2: #38bdf8;
      --danger: #f87171;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
    }

    main {
      width: min(1080px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 36px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 20px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--line);
    }

    h1 {
      margin: 0;
      font-size: clamp(1.8rem, 4vw, 3.1rem);
      letter-spacing: 0;
      line-height: 1;
    }

    .subtitle {
      margin: 10px 0 0;
      color: var(--muted);
      max-width: 62ch;
    }

    .status {
      min-width: 190px;
      padding: 10px 12px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--muted);
      font-size: 0.92rem;
      text-align: right;
    }

    .status strong {
      display: block;
      color: var(--text);
      font-size: 1rem;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 14px;
      margin-top: 22px;
      align-items: stretch;
    }

    section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }

    .file-panel {
      grid-column: span 7;
    }

    .midi-panel {
      grid-column: span 5;
    }

    .mix-panel {
      grid-column: 1 / -1;
    }

    h2 {
      margin: 0 0 14px;
      font-size: 1rem;
      font-weight: 700;
    }

    .row {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    button,
    .file-button,
    select {
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-2);
      color: var(--text);
      padding: 0 13px;
      font: inherit;
    }

    button,
    .file-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      font-weight: 700;
    }

    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #17130a;
    }

    button:disabled,
    select:disabled {
      cursor: not-allowed;
      opacity: 0.5;
    }

    input[type="file"] {
      inline-size: 1px;
      block-size: 1px;
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    input[type="range"] {
      width: 180px;
      accent-color: var(--accent);
    }

    .meta {
      margin-top: 12px;
      color: var(--muted);
      font-size: 0.92rem;
      min-height: 22px;
    }

    .channels {
      display: grid;
      gap: 14px;
    }

    .chip {
      display: grid;
      gap: 10px;
    }

    .chip-title {
      margin: 0;
      color: var(--muted);
      font-size: 0.88rem;
      font-weight: 700;
      letter-spacing: 0;
    }

    .chip-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .channel {
      min-height: 112px;
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
    }

    .channel.active {
      border-color: var(--accent);
    }

    .channel-top {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-size: 0.86rem;
    }

    .note {
      margin-top: 14px;
      font-size: 1.8rem;
      font-weight: 800;
      line-height: 1;
    }

    .meter {
      height: 8px;
      margin-top: 14px;
      border-radius: 999px;
      overflow: hidden;
      background: #11161e;
    }

    .meter span {
      display: block;
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--accent-2), var(--accent));
    }

    .log {
      margin-top: 14px;
      height: 112px;
      overflow: auto;
      padding: 10px;
      background: #0d1015;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--muted);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.82rem;
      line-height: 1.45;
    }

    @media (max-width: 760px) {
      header {
        display: block;
      }

      .status {
        margin-top: 16px;
        text-align: left;
      }

      .file-panel,
      .midi-panel {
        grid-column: 1 / -1;
      }

      .chip-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>POKEY MIDI Synth</h1>
        <p class="subtitle">Atari POKEY-style synthesis driven by a MIDI or midicsv file, or a live Web MIDI device.</p>
      </div>
      <div class="status">
        <strong id="audioState">Audio stopped</strong>
        <span id="sourceState">No source loaded</span>
      </div>
    </header>

    <div class="controls">
      <section class="file-panel">
        <h2>MIDI File</h2>
        <div class="row">
          <label class="file-button" for="midiFile">Load MIDI</label>
          <input id="midiFile" type="file" accept=".mid,.midi,.midicsv,.csv,text/csv,audio/midi,audio/x-midi">
          <button id="playFile" class="primary" disabled>Play</button>
          <button id="stopFile" disabled>Stop</button>
        </div>
        <div class="meta" id="fileMeta">Choose a Standard MIDI File or midicsv file.</div>
      </section>

      <section class="midi-panel">
        <h2>Web MIDI</h2>
        <div class="row">
          <button id="enableMidi">Enable MIDI</button>
          <select id="midiInputs" disabled>
            <option>No MIDI inputs</option>
          </select>
        </div>
        <div class="meta" id="midiMeta">Browser support and device permission are required.</div>
      </section>

      <section class="mix-panel">
        <h2>Output</h2>
        <div class="row">
          <button id="startAudio" class="primary">Start Audio</button>
          <button id="panic">Panic</button>
          <label for="gain">Gain</label>
          <input id="gain" type="range" min="0" max="1" step="0.01" value="0.7">
        </div>
        <div class="channels" id="channels"></div>
        <div class="log" id="log" aria-live="polite"></div>
      </section>
    </div>
  </main>

  <script>
    const SAMPLE_RATE = 16000;
    const ARATE = 64000;
    const ARATE15 = 15699;
    const MIDI_NOTE_OFF = 0x80;
    const MIDI_NOTE_ON = 0x90;
    const MIDI_AFTERTOUCH = 0xa0;
    const MIDI_PROGRAM_CHANGE = 0xc0;
    const MIDI_PITCH_BEND = 0xe0;
    const POKEY_CHANNELS = 4;
    const MAX_POKEY_CHIPS = 4;
    const MAX_POKEY_CHANNELS = POKEY_CHANNELS * MAX_POKEY_CHIPS;

    const els = {
      audioState: document.querySelector("#audioState"),
      sourceState: document.querySelector("#sourceState"),
      midiFile: document.querySelector("#midiFile"),
      playFile: document.querySelector("#playFile"),
      stopFile: document.querySelector("#stopFile"),
      fileMeta: document.querySelector("#fileMeta"),
      enableMidi: document.querySelector("#enableMidi"),
      midiInputs: document.querySelector("#midiInputs"),
      midiMeta: document.querySelector("#midiMeta"),
      startAudio: document.querySelector("#startAudio"),
      panic: document.querySelector("#panic"),
      gain: document.querySelector("#gain"),
      channels: document.querySelector("#channels"),
      log: document.querySelector("#log")
    };

    const channelEls = [];

    function ensureChipDisplay(chipIndex) {
      while (els.channels.children.length <= chipIndex) {
        const chipNumber = els.channels.children.length + 1;
        const chip = document.createElement("div");
        chip.className = "chip";
        chip.innerHTML = `<h3 class="chip-title">POKEY chip ${chipNumber}</h3><div class="chip-grid"></div>`;
        const grid = chip.querySelector(".chip-grid");
        for (let i = 0; i < POKEY_CHANNELS; i++) {
          const channelIndex = (chipNumber - 1) * POKEY_CHANNELS + i;
          const channel = document.createElement("div");
          channel.className = "channel";
          channel.innerHTML = `
            <div class="channel-top"><span>Ch ${channelIndex + 1}</span><span class="dist">dist A</span></div>
            <div class="note">--</div>
            <div class="meter"><span></span></div>
          `;
          grid.append(channel);
          channelEls[channelIndex] = channel;
        }
        els.channels.append(chip);
      }
    }

    function setVisibleChipCount(count) {
      const chipCount = Math.max(1, Math.min(MAX_POKEY_CHIPS, count));
      ensureChipDisplay(chipCount - 1);
      while (els.channels.children.length > chipCount) {
        const chip = els.channels.lastElementChild;
        const start = (els.channels.children.length - 1) * POKEY_CHANNELS;
        for (let i = 0; i < POKEY_CHANNELS; i++) channelEls[start + i] = null;
        chip.remove();
      }
    }

    ensureChipDisplay(0);

    function log(message) {
      const time = new Date().toLocaleTimeString();
      els.log.textContent = `[${time}] ${message}\n` + els.log.textContent;
    }

    function midiNoteName(note) {
      const names = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
      return `${names[note % 12]}${Math.floor(note / 12) - 1}`;
    }

    class PokeySynth {
      constructor() {
        this.audioContext = null;
        this.node = null;
        this.gain = null;
        this.source = null;
        this.sampleRate = SAMPLE_RATE;
        this.pitchbend = Array(MAX_POKEY_CHANNELS).fill(8192);
        this.dist = Array(MAX_POKEY_CHANNELS).fill(0xa);
        this.renderedSamples = 0;
        this.filePlayback = null;
        this.dirtyChannels = new Set();
        this.displayUpdateScheduled = false;
        this.chips = [this.createChip()];
        this.channels = Array.from({ length: MAX_POKEY_CHANNELS }, () => this.createChannel());
        this.lfsr4Lookup = this.makeLookup(15, 1, this.calcLfsr4);
        this.lfsr5Lookup = this.makeLookup(31, 1, this.calcLfsr5);
      }

      createChannel() {
        return {
          dist: 0xa,
          audf: 0,
          volume: 0,
          value: 0,
          anext: 0,
          use15k: false,
          note: null,
          velocity: 0
        };
      }

      createChip() {
        return {
          scounter: 0,
          lfsr4: 1,
          lfsr5: 1,
          lfsr17: 1
        };
      }

      ensureChip(chipIndex) {
        const cappedIndex = Math.min(chipIndex, MAX_POKEY_CHIPS - 1);
        while (this.chips.length <= cappedIndex) {
          this.chips.push(this.createChip());
          ensureChipDisplay(this.chips.length - 1);
        }
      }

      setChipCount(count) {
        const chipCount = Math.max(1, Math.min(MAX_POKEY_CHIPS, count));
        this.chips = Array.from({ length: chipCount }, () => this.createChip());
        this.pitchbend.fill(8192);
        this.dist.fill(0xa);
        this.channels = Array.from({ length: MAX_POKEY_CHANNELS }, () => this.createChannel());
        this.dirtyChannels.clear();
        setVisibleChipCount(chipCount);
        for (let i = 0; i < chipCount * POKEY_CHANNELS; i++) this.queueChannelDisplay(i);
      }

      ensureMidiChannel(midiChannel) {
        const slot = Math.min(midiChannel, MAX_POKEY_CHANNELS - 1);
        this.ensureChip(Math.floor(slot / POKEY_CHANNELS));
        return slot;
      }

      configureForMidiFile(midiFile) {
        let maxChannel = 0;
        for (const event of midiFile.midiEvents) {
          const command = event.data[0] & 0xf0;
          if (command >= MIDI_NOTE_OFF && command <= MIDI_PITCH_BEND) {
            maxChannel = Math.max(maxChannel, event.data[0] & 0x0f);
          }
        }
        this.setChipCount(Math.floor(maxChannel / POKEY_CHANNELS) + 1);
      }

      makeLookup(count, start, fn) {
        const values = [];
        let n = start;
        for (let i = 0; i < count; i++) {
          n = fn(n);
          values.push(n);
        }
        return values;
      }

      calcLfsr4(v) {
        return (v << 1) | (((v >> 2) ^ (v >> 3)) & 1);
      }

      calcLfsr5(v) {
        return (v << 1) | (((v >> 2) ^ (v >> 4)) & 1);
      }

      calcLfsr17(v) {
        return ((v << 1) >>> 0) | (((v >> 2) ^ (v >> 16)) & 1);
      }

      async start() {
        if (!this.audioContext) {
          const Context = window.AudioContext || window.webkitAudioContext;
          if (!Context) throw new Error("Web Audio is not available in this browser.");
          this.audioContext = new Context({ sampleRate: SAMPLE_RATE });
          this.sampleRate = this.audioContext.sampleRate;
          this.gain = this.audioContext.createGain();
          this.gain.gain.value = Number(els.gain.value);
          this.source = this.audioContext.createConstantSource ?
            this.audioContext.createConstantSource() :
            this.audioContext.createOscillator();
          if ("offset" in this.source) this.source.offset.value = 0;
          this.node = this.audioContext.createScriptProcessor(1024, 1, 1);
          this.node.onaudioprocess = (event) => {
            const output = event.outputBuffer.getChannelData(0);
            for (let i = 0; i < output.length; i++) {
              this.processFilePlayback();
              output[i] = (this.generate() - this.chips.length * 30) / (this.chips.length * 32);
              this.renderedSamples++;
            }
          };
          this.source.connect(this.node);
          this.node.connect(this.gain);
          this.gain.connect(this.audioContext.destination);
          this.source.start();
        }
        await this.audioContext.resume();
        els.audioState.textContent = "Audio running";
        els.startAudio.disabled = true;
      }

      setGain(value) {
        if (this.gain) this.gain.gain.value = value;
      }

      playMidiFile(midiFile, onFinished) {
        this.filePlayback = {
          events: midiFile.midiEvents,
          duration: midiFile.duration,
          cursor: 0,
          startSample: this.renderedSamples,
          onFinished
        };
      }

      stopMidiFile() {
        this.filePlayback = null;
      }

      processFilePlayback() {
        if (!this.filePlayback) return;
        const playback = this.filePlayback;
        const elapsed = (this.renderedSamples - playback.startSample) / this.sampleRate;
        while (
          playback.cursor < playback.events.length &&
          playback.events[playback.cursor].time <= elapsed
        ) {
          this.handleMidi(playback.events[playback.cursor].data);
          playback.cursor++;
        }

        if (playback.cursor >= playback.events.length && elapsed >= playback.duration) {
          this.filePlayback = null;
          if (playback.onFinished) playback.onFinished(elapsed);
        }
      }

      noteToAudf(note, bend) {
        const semitoneBend = ((bend - 8192) / 8192) * 2;
        const frequency = 440 * Math.pow(2, (note + semitoneBend - 69) / 12);
        const use15k = frequency < 123.5;
        const clockDivisor = use15k ? 114 : 28;
        const audf = Math.max(1, Math.min(255, Math.floor(3579545 / clockDivisor / (Math.floor(frequency) << 2) - 1)));
        return { audf, use15k };
      }

      setPokeyAudfAudc(channel, audc, audf, use15k, note = null, velocity = 0) {
        this.ensureChip(Math.floor(channel / POKEY_CHANNELS));
        const c = this.channels[channel];
        c.volume = audc & 0xf;
        c.dist = audc >> 4;
        c.audf = audf;
        c.use15k = use15k;
        c.note = note;
        c.velocity = velocity;
        this.queueChannelDisplay(channel);
      }

      queueChannelDisplay(channel) {
        this.dirtyChannels.add(channel);
        if (this.displayUpdateScheduled) return;
        this.displayUpdateScheduled = true;
        requestAnimationFrame(() => {
          this.displayUpdateScheduled = false;
          const channels = [...this.dirtyChannels];
          this.dirtyChannels.clear();
          for (const dirtyChannel of channels) this.updateChannelDisplay(dirtyChannel);
        });
      }

      updateChannelDisplay(channel) {
        const c = this.channels[channel];
        const el = channelEls[channel];
        if (!el) return;
        el.classList.toggle("active", c.volume > 0);
        el.querySelector(".dist").textContent = `dist ${c.dist.toString(16).toUpperCase()}`;
        el.querySelector(".note").textContent = c.note == null ? "--" : midiNoteName(c.note);
        el.querySelector(".meter span").style.width = `${Math.min(100, c.volume / 15 * 100)}%`;
      }

      checkLfsr(chip, dist, value) {
        if (dist & 0x8) {
          if (dist & 0x2) return (value + 1) & 1;
          if (dist & 0x4) return chip.lfsr4 & 1;
          return chip.lfsr17 & 1;
        }
        if (dist & 0x2) return chip.lfsr5 & 1;
        if (dist & 0x4) return (chip.lfsr5 & chip.lfsr4) & 1;
        return (chip.lfsr5 & chip.lfsr17) & 1;
      }

      generate() {
        let out = 0;
        for (let chipIndex = 0; chipIndex < this.chips.length; chipIndex++) {
          const chip = this.chips[chipIndex];
          chip.lfsr17 = this.calcLfsr17(chip.lfsr17);
          let arate = ARATE;
          for (let i = 0; i < POKEY_CHANNELS; i++) {
            const c = this.channels[chipIndex * POKEY_CHANNELS + i];
            if (c.use15k) arate = ARATE15;
            if (!c.audf) continue;
            const audfDiv = this.sampleRate * (c.audf + 1);
            if (arate > chip.scounter % audfDiv) {
              const acounter = c.anext;
              c.anext += audfDiv;
              chip.lfsr4 = this.lfsr4Lookup[acounter % 15];
              chip.lfsr5 = this.lfsr5Lookup[acounter % 31];
              c.value = this.checkLfsr(chip, c.dist, c.value);
            }
            out += c.value & 1 ? c.volume : 0;
          }
          chip.scounter += arate;
        }
        return out;
      }

      handleMidi(data) {
        const status = data[0];
        const data1 = data[1] || 0;
        const data2 = data[2] || 0;
        const command = status & 0xf0;
        if (command < MIDI_NOTE_OFF || command > MIDI_PITCH_BEND) return;
        const mchannel = this.ensureMidiChannel(status & 0x0f);
        if ((command === MIDI_NOTE_ON || command === MIDI_AFTERTOUCH) && data2 > 0) {
          const { audf, use15k } = this.noteToAudf(data1, this.pitchbend[mchannel]);
          this.setPokeyAudfAudc(mchannel, (this.dist[mchannel] << 4) | (data2 >> 3), audf, use15k, data1, data2);
        } else if (command === MIDI_NOTE_OFF || (command === MIDI_NOTE_ON && data2 === 0)) {
          this.setPokeyAudfAudc(mchannel, 0, 0, false);
        } else if (command === MIDI_PROGRAM_CHANGE) {
          this.dist[mchannel] = data1 === 117 ? 0x8 :
            data1 === 116 ? 0xa :
            data1 === 115 ? 0x4 :
            data1 === 114 ? 0x2 : 0xa;
          this.queueChannelDisplay(mchannel);
        } else if (command === MIDI_PITCH_BEND) {
          this.pitchbend[mchannel] = data1 | (data2 << 7);
          const c = this.channels[mchannel];
          if (c.note != null && c.volume > 0) {
            const { audf, use15k } = this.noteToAudf(c.note, this.pitchbend[mchannel]);
            this.setPokeyAudfAudc(mchannel, (this.dist[mchannel] << 4) | c.volume, audf, use15k, c.note, c.velocity);
          }
        }
      }

      panic() {
        for (let i = 0; i < this.chips.length * POKEY_CHANNELS; i++) {
          this.setPokeyAudfAudc(i, 0, 0, false);
        }
      }
    }

    class MidiFile {
      constructor(arrayBuffer) {
        this.view = new DataView(arrayBuffer);
        this.pos = 0;
        this.format = 0;
        this.trackCount = 0;
        this.division = 480;
        this.events = [];
        this.parse();
      }

      readU8() {
        return this.view.getUint8(this.pos++);
      }

      readU16() {
        const value = this.view.getUint16(this.pos);
        this.pos += 2;
        return value;
      }

      readU32() {
        const value = this.view.getUint32(this.pos);
        this.pos += 4;
        return value;
      }

      readText(length) {
        let text = "";
        for (let i = 0; i < length; i++) text += String.fromCharCode(this.readU8());
        return text;
      }

      readVar() {
        let value = 0;
        while (true) {
          const byte = this.readU8();
          value = (value << 7) | (byte & 0x7f);
          if ((byte & 0x80) === 0) return value;
        }
      }

      parse() {
        if (this.readText(4) !== "MThd") throw new Error("Missing MIDI header.");
        const headerLength = this.readU32();
        this.format = this.readU16();
        this.trackCount = this.readU16();
        this.division = this.readU16();
        this.pos += headerLength - 6;
        if (this.division & 0x8000) throw new Error("SMPTE time division is not supported.");
        for (let i = 0; i < this.trackCount; i++) this.parseTrack();
        this.events.sort((a, b) => {
          if (a.tick !== b.tick) return a.tick - b.tick;
          if (a.tempo && !b.tempo) return -1;
          if (!a.tempo && b.tempo) return 1;
          return 0;
        });
        this.applyTempo();
      }

      parseTrack() {
        if (this.readText(4) !== "MTrk") throw new Error("Missing MIDI track.");
        const length = this.readU32();
        const end = this.pos + length;
        let tick = 0;
        let runningStatus = 0;
        while (this.pos < end) {
          tick += this.readVar();
          let status = this.readU8();
          if (status < 0x80) {
            this.pos--;
            status = runningStatus;
          } else {
            runningStatus = status;
          }

          if (status === 0xff) {
            const type = this.readU8();
            const length = this.readVar();
            if (type === 0x51 && length === 3) {
              const tempo = (this.readU8() << 16) | (this.readU8() << 8) | this.readU8();
              this.events.push({ tick, tempo });
            } else {
              this.pos += length;
            }
          } else if (status === 0xf0 || status === 0xf7) {
            const length = this.readVar();
            this.pos += length;
          } else {
            const command = status & 0xf0;
            const data1 = this.readU8();
            const data2 = command === MIDI_PROGRAM_CHANGE || command === 0xd0 ? 0 : this.readU8();
            if (command >= 0x80 && command <= 0xe0) {
              this.events.push({ tick, data: [status, data1, data2] });
            }
          }
        }
        this.pos = end;
      }

      applyTempo() {
        let tempo = 500000;
        let lastTick = 0;
        let seconds = 0;
        for (const event of this.events) {
          seconds += (event.tick - lastTick) * tempo / this.division / 1000000;
          event.time = seconds;
          lastTick = event.tick;
          if (event.tempo) tempo = event.tempo;
        }
        this.duration = this.events.length ? this.events[this.events.length - 1].time : 0;
        this.midiEvents = this.events.filter((event) => event.data);
      }
    }

    class MidiCsvFile {
      constructor(text) {
        this.division = 480;
        this.events = [];
        this.parse(text);
      }

      parse(text) {
        const lines = text.split(/\r?\n/);
        for (let lineNumber = 0; lineNumber < lines.length; lineNumber++) {
          const line = lines[lineNumber].trim();
          if (!line || line.startsWith("#") || line.startsWith(";")) continue;

          const fields = parseCsvRecord(line);
          if (fields.length < 3) throw new Error(`Invalid midicsv record on line ${lineNumber + 1}.`);

          const tick = parseInteger(fields[1], `time on line ${lineNumber + 1}`);
          const type = fields[2].trim().toLowerCase();

          if (type === "header") {
            if (fields.length < 6) throw new Error(`Invalid Header record on line ${lineNumber + 1}.`);
            this.division = parseInteger(fields[5], `division on line ${lineNumber + 1}`);
            if (this.division & 0x8000) throw new Error("SMPTE time division is not supported.");
          } else if (type === "tempo") {
            this.events.push({
              tick,
              tempo: parseInteger(fields[3], `tempo on line ${lineNumber + 1}`)
            });
          } else {
            const data = this.channelEventToMidi(type, fields, lineNumber + 1);
            if (data) this.events.push({ tick, data });
          }
        }

        this.events.sort((a, b) => {
          if (a.tick !== b.tick) return a.tick - b.tick;
          if (a.tempo && !b.tempo) return -1;
          if (!a.tempo && b.tempo) return 1;
          return 0;
        });
        this.applyTempo();
      }

      channelEventToMidi(type, fields, lineNumber) {
        const channel = () => parseInteger(fields[3], `channel on line ${lineNumber}`) & 0x0f;
        const value = (index, name) => parseInteger(fields[index], `${name} on line ${lineNumber}`) & 0x7f;

        if (type === "note_on_c") return [MIDI_NOTE_ON | channel(), value(4, "note"), value(5, "velocity")];
        if (type === "note_off_c") return [MIDI_NOTE_OFF | channel(), value(4, "note"), value(5, "velocity")];
        if (type === "poly_aftertouch_c") return [MIDI_AFTERTOUCH | channel(), value(4, "note"), value(5, "value")];
        if (type === "program_c") return [MIDI_PROGRAM_CHANGE | channel(), value(4, "program"), 0];
        if (type === "pitch_bend_c") {
          const bend = Math.max(0, Math.min(16383, parseInteger(fields[4], `pitch bend on line ${lineNumber}`)));
          return [MIDI_PITCH_BEND | channel(), bend & 0x7f, (bend >> 7) & 0x7f];
        }
        if (type === "control_c") return [0xb0 | channel(), value(4, "control"), value(5, "value")];
        if (type === "channel_aftertouch_c") return [0xd0 | channel(), value(4, "value"), 0];
        return null;
      }

      applyTempo() {
        let tempo = 500000;
        let lastTick = 0;
        let seconds = 0;
        for (const event of this.events) {
          seconds += (event.tick - lastTick) * tempo / this.division / 1000000;
          event.time = seconds;
          lastTick = event.tick;
          if (event.tempo) tempo = event.tempo;
        }
        this.duration = this.events.length ? this.events[this.events.length - 1].time : 0;
        this.midiEvents = this.events.filter((event) => event.data);
      }
    }

    function parseInteger(value, name) {
      const number = Number.parseInt(String(value).trim(), 10);
      if (!Number.isFinite(number)) throw new Error(`Invalid ${name}.`);
      return number;
    }

    function parseCsvRecord(line) {
      const fields = [];
      let field = "";
      let quoted = false;
      for (let i = 0; i < line.length; i++) {
        const char = line[i];
        if (quoted) {
          if (char === '"' && line[i + 1] === '"') {
            field += '"';
            i++;
          } else if (char === '"') {
            quoted = false;
          } else {
            field += char;
          }
        } else if (char === '"') {
          quoted = true;
        } else if (char === ",") {
          fields.push(field.trim());
          field = "";
        } else {
          field += char;
        }
      }
      fields.push(field.trim());
      return fields;
    }

    async function loadMidiLikeFile(file) {
      const name = file.name.toLowerCase();
      if (name.endsWith(".midicsv") || name.endsWith(".csv")) {
        return new MidiCsvFile(await file.text());
      }
      return new MidiFile(await file.arrayBuffer());
    }

    const synth = new PokeySynth();
    let midiAccess = null;
    let selectedInput = null;
    let loadedMidi = null;

    async function ensureAudio() {
      try {
        await synth.start();
      } catch (error) {
        log(error.message);
      }
    }

    function stopFile({ silence = true } = {}) {
      synth.stopMidiFile();
      els.playFile.disabled = !loadedMidi;
      els.stopFile.disabled = true;
      els.sourceState.textContent = loadedMidi ? "MIDI file loaded" : "No source loaded";
      if (silence) synth.panic();
    }

    async function playFile() {
      if (!loadedMidi) return;
      await ensureAudio();
      stopFile();
      els.playFile.disabled = true;
      els.stopFile.disabled = false;
      els.sourceState.textContent = "Playing MIDI file";
      synth.playMidiFile(loadedMidi, (elapsed) => {
        els.playFile.disabled = false;
        els.stopFile.disabled = true;
        els.sourceState.textContent = "MIDI file loaded";
        synth.panic();
        log(`Finished file playback in ${elapsed.toFixed(1)}s.`);
      });
    }

    function refreshMidiInputs() {
      const inputs = midiAccess ? [...midiAccess.inputs.values()] : [];
      els.midiInputs.innerHTML = "";
      if (!inputs.length) {
        els.midiInputs.disabled = true;
        els.midiInputs.append(new Option("No MIDI inputs", ""));
        return;
      }
      els.midiInputs.disabled = false;
      for (const input of inputs) {
        els.midiInputs.append(new Option(input.name || input.id, input.id));
      }
      if (!selectedInput || !inputs.some((input) => input.id === selectedInput.id)) {
        selectMidiInput(inputs[0].id);
      }
    }

    function selectMidiInput(id) {
      if (selectedInput) selectedInput.onmidimessage = null;
      selectedInput = midiAccess ? midiAccess.inputs.get(id) : null;
      if (!selectedInput) return;
      selectedInput.onmidimessage = async (event) => {
        await ensureAudio();
        stopFile({ silence: false });
        synth.handleMidi([...event.data]);
      };
      els.midiInputs.value = id;
      els.sourceState.textContent = "Listening to Web MIDI";
      els.midiMeta.textContent = selectedInput.name || selectedInput.id;
      log(`Selected MIDI input: ${selectedInput.name || selectedInput.id}`);
    }

    els.startAudio.addEventListener("click", ensureAudio);
    els.gain.addEventListener("input", () => synth.setGain(Number(els.gain.value)));
    els.panic.addEventListener("click", () => {
      stopFile();
      synth.panic();
      log("All POKEY channels silenced.");
    });

    els.midiFile.addEventListener("change", async () => {
      const file = els.midiFile.files[0];
      if (!file) return;
      stopFile();
      try {
        loadedMidi = await loadMidiLikeFile(file);
        synth.configureForMidiFile(loadedMidi);
        els.playFile.disabled = loadedMidi.midiEvents.length === 0;
        els.fileMeta.textContent = `${file.name}: ${loadedMidi.midiEvents.length} MIDI events, ${loadedMidi.duration.toFixed(1)}s.`;
        els.sourceState.textContent = "MIDI file loaded";
        log(`Loaded ${file.name}.`);
      } catch (error) {
        loadedMidi = null;
        els.playFile.disabled = true;
        els.fileMeta.textContent = error.message;
        log(`Could not load MIDI file: ${error.message}`);
      }
    });

    els.playFile.addEventListener("click", playFile);
    els.stopFile.addEventListener("click", stopFile);

    els.enableMidi.addEventListener("click", async () => {
      if (!navigator.requestMIDIAccess) {
        els.midiMeta.textContent = "Web MIDI is not available in this browser.";
        log("Web MIDI is not available.");
        return;
      }
      try {
        midiAccess = await navigator.requestMIDIAccess();
        midiAccess.onstatechange = refreshMidiInputs;
        refreshMidiInputs();
        els.enableMidi.disabled = true;
        log("Web MIDI enabled.");
      } catch (error) {
        els.midiMeta.textContent = "MIDI permission was denied or unavailable.";
        log(`Could not enable Web MIDI: ${error.message}`);
      }
    });

    els.midiInputs.addEventListener("change", () => selectMidiInput(els.midiInputs.value));
  </script>
</body>
</html>
